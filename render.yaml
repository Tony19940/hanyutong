databases:
  - name: hanyutong-db
    databaseName: hanyutong
    user: hanyutong
    plan: free

services:
  - type: web
    name: hanyutong
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_TOKEN
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: hanyutong-db
          property: connectionString
      - key: USER_SESSION_TTL_HOURS
        value: 168
      - key: ADMIN_SESSION_TTL_HOURS
        value: 12
      - key: LOGIN_RATE_WINDOW_MS
        value: 900000
      - key: LOGIN_RATE_LIMIT
        value: 10
      - key: ADMIN_RATE_WINDOW_MS
        value: 900000
      - key: ADMIN_RATE_LIMIT
        value: 5
      - key: DOUBAO_DIALOG_APP_ID
        sync: false
      - key: DOUBAO_DIALOG_ACCESS_TOKEN
        sync: false
      - key: DOUBAO_DIALOG_APP_KEY
        sync: false
      - key: DOUBAO_DIALOG_RESOURCE_ID
        value: volc.speech.dialog
      - key: DOUBAO_DIALOG_WS_URL
        value: wss://openspeech.bytedance.com/api/v3/realtime/dialogue
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_KHMER_MODEL
        value: gemini-3.1-flash-live-preview
      - key: GEMINI_KHMER_VOICE_NAME
        value: Gacrux
      - key: XFYUN_APP_ID
        sync: false
      - key: XFYUN_API_KEY
        sync: false
      - key: XFYUN_API_SECRET
        sync: false
